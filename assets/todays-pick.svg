<svg width="840" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#C9A96E;#58a6ff" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#C9A96E">
        <animate attributeName="stop-color" values="#C9A96E;#58a6ff;#C9A96E" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#C9A96E;#58a6ff" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="838" height="58" rx="8" fill="#0d1117" stroke="url(#border-gradient)" stroke-width="1.5" />

  <circle cx="28" cy="30" r="4" fill="#58a6ff" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>

  <text x="50" y="35" fill="#58a6ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="4">TODAY'S PICK</text>

  <text x="250" y="35" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600">shader.se</text>

  <text x="430" y="35" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400">Overall</text>
  <text x="490" y="35" fill="#C9A96E" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700">8.55</text>

  <text x="760" y="35" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" text-anchor="end">Awwwards</text>

  <text x="790" y="36" fill="#58a6ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400">→</text>
</svg>
