<svg width="850" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#C9A96E;#ffffff" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#C9A96E">
        <animate attributeName="stop-color" values="#C9A96E;#ffffff;#C9A96E" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117" rx="10" />

  <!-- Animated particles -->
  <circle cx="120" cy="45" r="1" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="0s" />
  </circle>
  <circle cx="340" cy="28" r="0.8" fill="#58a6ff">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite" begin="1s" />
  </circle>
  <circle cx="580" cy="52" r="1.2" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite" begin="0.5s" />
  </circle>
  <circle cx="720" cy="35" r="0.7" fill="#58a6ff">
    <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite" begin="2s" />
  </circle>
  <circle cx="200" cy="160" r="0.9" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite" begin="1.5s" />
  </circle>
  <circle cx="650" cy="155" r="1" fill="#58a6ff">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="0.8s" />
  </circle>
  <circle cx="450" cy="15" r="0.6" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.3;0" dur="6s" repeatCount="indefinite" begin="3s" />
  </circle>
  <circle cx="80" cy="140" r="0.8" fill="#58a6ff">
    <animate attributeName="opacity" values="0;0.4;0" dur="4.5s" repeatCount="indefinite" begin="2.5s" />
  </circle>
  <circle cx="770" cy="130" r="0.7" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.5;0" dur="3.8s" repeatCount="indefinite" begin="1.2s" />
  </circle>
  <circle cx="300" cy="170" r="1.1" fill="#58a6ff">
    <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite" begin="0.3s" />
  </circle>
  <circle cx="500" cy="165" r="0.5" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.4;0" dur="3.2s" repeatCount="indefinite" begin="1.8s" />
  </circle>
  <circle cx="160" cy="80" r="0.6" fill="#58a6ff">
    <animate attributeName="opacity" values="0;0.3;0" dur="4.2s" repeatCount="indefinite" begin="2.2s" />
  </circle>
  <circle cx="690" cy="70" r="0.9" fill="#C9A96E">
    <animate attributeName="opacity" values="0;0.5;0" dur="3.6s" repeatCount="indefinite" begin="0.7s" />
  </circle>

  <!-- Title with animated gradient -->
  <text x="425" y="85" text-anchor="middle" fill="url(#title-gradient)" font-family="'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="600" letter-spacing="8" filter="url(#subtle-glow)">CLEANLYSTUDIO</text>

  <text x="425" y="125" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" letter-spacing="5">CREATIVE DEVELOPMENT</text>

  <!-- Animated line -->
  <line x1="375" y1="148" x2="475" y2="148" stroke="#30363d" stroke-width="1">
    <animate attributeName="x1" values="375;350;375" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x2" values="475;500;475" dur="4s" repeatCount="indefinite" />
  </line>

  <text x="425" y="175" text-anchor="middle" fill="#58a6ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="400" letter-spacing="2">fade.run</text>
</svg>
